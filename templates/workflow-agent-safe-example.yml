# Example: Least-Privilege Agent Workflow

> **How to use:** Copy this file to `.github/workflows/agent-safe-<task>.yml` in your repository.
> Replace every `REPLACE` placeholder. CODEOWNERS review is required before activating.

---

```yaml
name: agent-safe-example
# ANNOTATION: Use a descriptive name. Prefix with "agent-" to make agent workflows easy to find.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  # ANNOTATION: Other safe triggers: workflow_dispatch, issues: [opened], push (non-main branches only).
  # Avoid: push to main, schedule (hard to audit), release (high impact).

# ── Workflow-level permission ceiling ─────────────────────────────────────────
# ANNOTATION: This is the MAXIMUM scope any job in this file can have.
# Jobs that need less should override with their own permissions block.
# Start with contents:read and add only what each job actually needs.
permissions:
  contents: read
  pull-requests: write
  checks: read

jobs:
  # ── Job 1: Read-only analysis ────────────────────────────────────────────────
  analyze:
    name: Read and analyze
    runs-on: ubuntu-latest
    permissions:
      contents: read   # ANNOTATION: Override to be narrower than workflow ceiling.
    outputs:
      result: ${{ steps.analyze.outputs.result }}
      safe_to_proceed: ${{ steps.guard.outputs.safe_to_proceed }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          # ANNOTATION: persist-credentials: false prevents the token from being
          # available to subsequent steps via git credential store.

      - name: Analyze input
        id: analyze
        run: |
          # REPLACE: add your analysis logic here.
          echo "result=analysis_complete" >> "$GITHUB_OUTPUT"

      - name: Guardrail check
        id: guard
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Stop condition: check for sensitive paths in the diff.
          sensitive=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | \
            grep -E '^\.github/workflows/|^CODEOWNERS' || true)
          if [ -n "$sensitive" ]; then
            echo "safe_to_proceed=false" >> "$GITHUB_OUTPUT"
            echo "::error::Sensitive paths detected. Halting per stop condition."
          else
            echo "safe_to_proceed=true" >> "$GITHUB_OUTPUT"
          fi

  # ── Job 2: Act on the analysis result ────────────────────────────────────────
  act:
    name: Act on result
    needs: analyze
    if: needs.analyze.outputs.safe_to_proceed == 'true'
    # ANNOTATION: The if condition prevents this job from running if the guard failed.
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write   # Only this job needs write access.
      contents: read

    steps:
      - name: Post result as PR comment
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          RESULT: ${{ needs.analyze.outputs.result }}
        run: |
          gh pr comment "$PR_NUMBER" \
            --repo "$REPO" \
            --body "## 🤖 Agent Result

          **Result:** ${RESULT}

          > Generated by \`agent-safe-example\` workflow (Autonomy Level 2).
          > A human reviewer must approve before merge."
          # ANNOTATION: Always include the attribution footer.
          # Always include a note that human approval is required.
```

---

## Key Patterns in This Example

| Pattern | Where | Why |
| --- | --- | --- |
| Workflow-level `permissions:` ceiling | Top of file | Caps all jobs; prevents accidental over-permission |
| Job-level `permissions:` override | Each job | Each job gets only what it needs |
| `persist-credentials: false` on checkout | `analyze` job | Prevents token leakage through git credential store |
| Guard step with `if:` condition | `act` job | Stops execution on sensitive-path detection |
| Attribution footer in comment | `act` job | Required audit trail item |

## What to Change for Your Use Case

1. Replace `on: pull_request` with the event appropriate for your task.
2. Replace the `analyze` step with your actual read logic.
3. Replace the `act` step with your actual write logic.
4. Narrow `permissions:` to the minimum your logic requires.
5. Add stop conditions specific to your task.
