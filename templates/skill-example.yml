# Example: `.github/skills/<skill-name>.yml`

> **How to use this file:** Copy the YAML block below to `.github/skills/<your-skill>.yml`.
> Fill in every field. Remove annotation comments before committing.
> CODEOWNERS review is required before merging skill files.

---

```yaml
# ── Skill metadata ─────────────────────────────────────────────────────────────
name: example-skill
# ANNOTATION: Use kebab-case. Must be unique across all skills in .github/skills/.

description: >
  One-paragraph description of what this skill does, what it reads,
  what it writes, and what it does NOT do. Be explicit.
# ANNOTATION: Reviewers use this description to assess risk. Make it complete.

autonomy_level: 2
# ANNOTATION: One of 0, 1, 2, 3, 4. Most skills should be Level 1 or 2.
# Level 3+ requires an environment approval gate in the calling workflow.

# ── Trigger ────────────────────────────────────────────────────────────────────
trigger:
  event: workflow_dispatch
  # ANNOTATION: Other options: pull_request, issues, push, schedule.
  # workflow_dispatch is the safest default — requires explicit human trigger.
  inputs:
    input_one:
      description: "Description of this input for the UI"
      required: true
    input_two:
      description: "Optional input with a default"
      required: false
      default: "default_value"

# ── Input schema ───────────────────────────────────────────────────────────────
input_schema:
  input_one:
    type: string
    required: true
    description: Full description of what this input represents.
  input_two:
    type: string
    required: false
    default: "default_value"
    description: Full description with valid values or constraints.

# ── Output schema ──────────────────────────────────────────────────────────────
output_schema:
  primary_output:
    type: string
    # ANNOTATION: Types: string | integer | boolean | file_path | pr_number | artifact_name
    description: What the agent produces as its primary output.
  secondary_output:
    type: boolean
    description: A secondary flag or status produced alongside the primary output.

# ── Permissions ────────────────────────────────────────────────────────────────
permissions:
  contents: read
  pull-requests: write
  # ANNOTATION: List ONLY the permissions this skill needs.
  # Never add permissions "just in case". Start with contents:read and add only what is required.
  # Valid values: read | write | none
  # Valid keys: actions, checks, contents, deployments, issues, packages,
  #             pages, pull-requests, repository-projects, security-events,
  #             statuses, id-token

# ── Stop conditions ────────────────────────────────────────────────────────────
stop_conditions:
  - "REPLACE: condition that causes the agent to halt — e.g. diff touches .github/workflows/"
  - "REPLACE: another stop condition specific to this skill's domain"
  # ANNOTATION: Be specific. Vague stop conditions are not enforced reliably.
  # Reference the exact path patterns, size thresholds, or data patterns that should halt the agent.

# ── Audit trail ────────────────────────────────────────────────────────────────
audit_trail:
  required: true
  method: pr_comment
  # ANNOTATION: method options: pr_comment | issue_comment | pr_description | workflow_summary | workflow_artifact
  format: |
    ## Agent Action Summary
    **Skill:** example-skill
    **Action:** {description_of_action}
    **Rationale:** {rationale}
    > Generated by example-skill (Autonomy Level {autonomy_level}). Human review required.
  # ANNOTATION: The format is a template string. {placeholders} are replaced at runtime.

# ── MCP servers allowed ────────────────────────────────────────────────────────
mcp_servers_allowed:
  - github-rest
  # ANNOTATION: List only servers from .github/mcp-config.json that this skill needs.
  # Use an empty list [] if no MCP servers are required.
```

---

## Skill YAML Field Reference

| Field | Required | Description |
| --- | --- | --- |
| `name` | ✅ | Unique kebab-case identifier |
| `description` | ✅ | What the skill does, reads, writes, and does NOT do |
| `autonomy_level` | ✅ | Integer 0–4 |
| `trigger` | ✅ | GitHub Actions event and input definitions |
| `input_schema` | ✅ | All inputs with types, constraints, and descriptions |
| `output_schema` | ✅ | All outputs with types and descriptions |
| `permissions` | ✅ | Minimum GitHub token permissions required |
| `stop_conditions` | ✅ | Conditions that must halt the agent |
| `audit_trail` | ✅ | Required evidence format |
| `mcp_servers_allowed` | ✅ | List of approved MCP servers (may be empty) |

## Common Mistakes

- Requesting `contents: write` when `contents: read` is sufficient.
- Empty or vague stop conditions (`- "if something goes wrong"`).
- Omitting the attribution line from `audit_trail.format`.
- Allowing MCP servers not in `.github/mcp-config.json`.
