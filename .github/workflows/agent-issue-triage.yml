name: agent-issue-triage

on:
  issues:
    types: [opened]

# Minimum scopes: this workflow only reads content and writes to issues.
permissions:
  issues: write
  contents: read

jobs:
  triage:
    name: Triage new issue
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Detect issue category
        id: classify
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          title_lower=$(echo "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]')
          body_lower=$(echo "$ISSUE_BODY" | tr '[:upper:]' '[:lower:]')
          combined="$title_lower $body_lower"

          # Guard: detect potential secret patterns in issue body
          if echo "$ISSUE_BODY" | grep -qiE '(ghp_|github_pat_|-----BEGIN|password\s*[:=]|api[_-]?key\s*[:=])'; then
            echo "label=needs-security-review" >> "$GITHUB_OUTPUT"
            echo "sensitive=true" >> "$GITHUB_OUTPUT"
          elif echo "$combined" | grep -qiE '(bug|error|fail|crash|exception|broken|not work|issue)'; then
            echo "label=bug" >> "$GITHUB_OUTPUT"
            echo "sensitive=false" >> "$GITHUB_OUTPUT"
          elif echo "$combined" | grep -qiE '(feature|request|add|enhance|improve|suggest|would like)'; then
            echo "label=enhancement" >> "$GITHUB_OUTPUT"
            echo "sensitive=false" >> "$GITHUB_OUTPUT"
          elif echo "$combined" | grep -qiE '(doc|document|readme|guide|tutorial|typo|spelling)'; then
            echo "label=documentation" >> "$GITHUB_OUTPUT"
            echo "sensitive=false" >> "$GITHUB_OUTPUT"
          elif echo "$combined" | grep -qiE '(question|how|what|why|help|clarif)'; then
            echo "label=question" >> "$GITHUB_OUTPUT"
            echo "sensitive=false" >> "$GITHUB_OUTPUT"
          else
            echo "label=needs-triage" >> "$GITHUB_OUTPUT"
            echo "sensitive=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply label
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          LABEL: ${{ steps.classify.outputs.label }}
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --add-label "$LABEL" || \
          echo "::warning::Could not apply label '$LABEL' — it may not exist yet."

      - name: Post triage comment
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          LABEL: ${{ steps.classify.outputs.label }}
          SENSITIVE: ${{ steps.classify.outputs.sensitive }}
        run: |
          if [ "$SENSITIVE" = "true" ]; then
            cat > /tmp/triage.md << 'TRIAGE'
          ## 🛑 Agent Triage — Security Review Required

          This issue body may contain a **sensitive pattern** (token, key, or credential).

          The issue has been labelled `needs-security-review`. A maintainer should:
          1. Review the issue body and redact any sensitive content.
          2. Notify the reporter to rotate any exposed credentials immediately.
          3. Close or relabel the issue after review.

          > _Generated by `agent-issue-triage` workflow. Skill: `triage-issue`._
          TRIAGE
          else
            cat > /tmp/triage.md << TRIAGE
          ## 🤖 Agent Triage Summary

          **Detected category:** \`${LABEL}\`

          | Field | Value |
          | --- | --- |
          | Label applied | \`${LABEL}\` |
          | Auto-assignee | _(none — suggested by CODEOWNERS if applicable)_ |
          | Rationale | Keyword-based classification from issue title and body |

          A maintainer will review and confirm the label. Override it if the classification is incorrect.

          > _Generated by \`agent-issue-triage\` workflow (Autonomy Level 2). Skill: \`triage-issue\`._
          TRIAGE
          fi
          gh issue comment "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --body-file /tmp/triage.md
