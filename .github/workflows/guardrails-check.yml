name: guardrails-check

on:
  push:
    branches-ignore:
      - main   # main is protected; pushes here come only through PRs

# Read-only: this workflow validates but never modifies source.
permissions:
  contents: read
  pull-requests: read

jobs:
  # ── Check 1: Secret-pattern scan ────────────────────────────────────────────
  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 2

      - name: Scan diff for secret patterns
        run: |
          git diff HEAD~1 HEAD -- . \
            ':!*.md' ':!*.json' ':!*.yml' ':!*.yaml' \
            | grep -E '^\+' \
            | grep -iqE '(ghp_|github_pat_|-----BEGIN (RSA|EC|DSA|OPENSSH) PRIVATE|password\s*[:=]\s*["\x27][^"\x27]{8,}|api[_-]?key\s*[:=]\s*["\x27][^"\x27]{8,}|secret\s*[:=]\s*["\x27][^"\x27]{8,})' \
            && { echo "::error::Secret pattern detected in diff. Remove the credential before pushing."; exit 1; } \
            || echo "✅ No secret patterns found."

  # ── Check 2: Scope control — workflow file guard ──────────────────────────
  scope-control:
    name: scope-control
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 2

      - name: Detect workflow file changes by agent branch
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          # Agent branches must not modify workflow files.
          if echo "$BRANCH" | grep -qE '^(copilot/|agent/)'; then
            changed_workflows=$(git diff HEAD~1 HEAD --name-only | grep '^\.github/workflows/' || true)
            if [ -n "$changed_workflows" ]; then
              echo "::error::Agent branch '$BRANCH' modified workflow files: $changed_workflows"
              echo "::error::Per copilot-instructions.md stop condition #1, this is not permitted."
              exit 1
            else
              echo "✅ No workflow files modified on agent branch."
            fi
          else
            echo "ℹ️  Non-agent branch — scope-control check skipped for workflow files."
          fi

      - name: Detect CODEOWNERS changes by agent branch
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          if echo "$BRANCH" | grep -qE '^(copilot/|agent/)'; then
            changed_codeowners=$(git diff HEAD~1 HEAD --name-only | grep -E '^CODEOWNERS$|^\.github/CODEOWNERS$|^\.github/copilot-instructions\.md$' || true)
            if [ -n "$changed_codeowners" ]; then
              echo "::error::Agent branch '$BRANCH' modified governance files: $changed_codeowners"
              echo "::error::Per copilot-instructions.md stop condition #2, this is not permitted."
              exit 1
            else
              echo "✅ No governance files modified on agent branch."
            fi
          else
            echo "ℹ️  Non-agent branch — CODEOWNERS check skipped."
          fi

  # ── Check 3: Attribution — agent commits must have a rationale footer ──────
  guardrails-check:
    name: guardrails-check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 2

      - name: Verify agent commits have attribution footer
        env:
          BRANCH: ${{ github.ref_name }}
          COMMITTER: ${{ github.actor }}
        run: |
          if echo "$BRANCH" | grep -qE '^(copilot/|agent/)'; then
            # Check the most recent commit message for an attribution marker.
            commit_msg=$(git log -1 --format="%B")
            if echo "$commit_msg" | grep -iqE '(generated by|skill:|autonomy level|agent:)'; then
              echo "✅ Attribution footer found in commit message."
            else
              echo "::warning::Agent commit on '$BRANCH' is missing an attribution footer."
              echo "::warning::Recommended footer format: 'Generated by: <skill-name> (Autonomy Level 2)'"
              # Warning only — does not block; enforced as a required check at PR review stage.
            fi
          else
            echo "ℹ️  Non-agent branch — attribution check skipped."
          fi
