name: agent-pr-review

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Workflow-level ceiling: no job in this file may exceed these scopes.
permissions:
  contents: read
  pull-requests: write
  checks: read

jobs:
  # ── Job 1: Read-only diff analysis ─────────────────────────────────────────
  analyze-diff:
    name: Analyze PR diff
    runs-on: ubuntu-latest
    permissions:
      contents: read       # read-only; this job never writes
    outputs:
      file_count: ${{ steps.count.outputs.file_count }}
      touches_sensitive: ${{ steps.guard.outputs.touches_sensitive }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Count changed files
        id: count
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          count=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | wc -l | tr -d ' ')
          echo "file_count=$count" >> "$GITHUB_OUTPUT"
          echo "Files changed: $count"

      - name: Guard — check for sensitive paths
        id: guard
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Stop condition: diff touches .github/workflows/ or CODEOWNERS
          sensitive=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | \
            grep -E '^\.github/workflows/|^CODEOWNERS|^\.github/CODEOWNERS|^\.github/copilot-instructions\.md' || true)
          if [ -n "$sensitive" ]; then
            echo "touches_sensitive=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Sensitive paths detected: $sensitive"
          else
            echo "touches_sensitive=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Job 2: Post review comment ──────────────────────────────────────────────
  post-review:
    name: Post structured review comment
    needs: analyze-diff
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write  # only this job writes
      contents: read

    steps:
      - name: Build review summary
        id: summary
        env:
          FILE_COUNT: ${{ needs.analyze-diff.outputs.file_count }}
          TOUCHES_SENSITIVE: ${{ needs.analyze-diff.outputs.touches_sensitive }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          if [ "$TOUCHES_SENSITIVE" = "true" ]; then
            cat > /tmp/review.md << 'REVIEW'
          ## 🛑 Agent Review — Human Review Required

          This pull request touches one or more **sensitive paths** (`.github/workflows/`, `CODEOWNERS`, or `.github/copilot-instructions.md`).

          **Per `.github/copilot-instructions.md` stop condition #1 and #2, this agent cannot proceed.**

          A CODEOWNERS-designated human reviewer must review and approve this PR before merge.

          > _Generated by `agent-pr-review` workflow. Skill: `review-pr`._
          REVIEW
          else
            cat > /tmp/review.md << REVIEW
          ## 🤖 Agent Review Summary

          **PR:** #${PR_NUMBER} — ${PR_TITLE}
          **Author:** @${PR_AUTHOR}
          **Files changed:** ${FILE_COUNT}

          ### Checklist
          - [x] Diff read and analysed
          - [x] Sensitive-path guard passed (no workflow/CODEOWNERS changes)
          - [ ] Human reviewer approval required before merge

          ### Recommendation
          **Comment** — review the diff and approve or request changes as appropriate.

          > _Generated by \`agent-pr-review\` workflow (Autonomy Level 2). Skill: \`review-pr\`._
          > _A human reviewer must approve before this PR can be merged._
          REVIEW
          fi
          echo "done"

      - name: Post comment to PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr comment "$PR_NUMBER" \
            --repo "$REPO" \
            --body-file /tmp/review.md
