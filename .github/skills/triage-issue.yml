name: triage-issue
description: >
  Reads a newly opened issue body, classifies it (bug / enhancement /
  documentation / question / duplicate), suggests an appropriate label,
  and optionally suggests an assignee based on CODEOWNERS. Posts its
  reasoning as an issue comment and applies the label.
autonomy_level: 2
trigger:
  event: issues
  types: [opened]
input_schema:
  issue_number:
    type: integer
    required: true
    description: Issue number to triage.
  repository:
    type: string
    required: true
    description: "Owner/repo in the form owner/repo."
output_schema:
  label:
    type: string
    enum: [bug, enhancement, documentation, question, duplicate, needs-triage]
    description: Label to apply to the issue.
  assignee_suggestion:
    type: string
    description: GitHub username suggested as assignee (not auto-assigned).
  comment_body:
    type: string
    description: Markdown-formatted comment posted to the issue explaining the triage decision.
permissions:
  issues: write
  contents: read
stop_conditions:
  - "Issue body contains a secret pattern (token, key, password) — do not post it; stop and notify the security team."
  - "Issue references a production incident — escalate immediately; do not auto-label."
audit_trail:
  required: true
  method: issue_comment
  format: |
    ## Agent Triage Summary
    **Classification:** {label}
    **Suggested assignee:** {assignee_suggestion}
    **Rationale:** {rationale}
    > Generated by the triage-issue skill. Override this label if the classification is incorrect.
mcp_servers_allowed:
  - github-rest
