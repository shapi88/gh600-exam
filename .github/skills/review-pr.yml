name: review-pr
description: >
  Reads a pull request diff and posts a structured review comment summarising
  changed files, potential issues, and a recommended action (approve / request
  changes / comment). Does not approve or merge on its own.
autonomy_level: 2
trigger:
  event: pull_request
  types: [opened, synchronize, reopened]
input_schema:
  pr_number:
    type: integer
    required: true
    description: Pull request number to review.
  repository:
    type: string
    required: true
    description: "Owner/repo in the form owner/repo."
output_schema:
  comment_body:
    type: string
    description: Markdown-formatted review comment posted to the PR.
  recommendation:
    type: string
    enum: [approve, request_changes, comment]
    description: The agent's recommended review action.
  files_reviewed:
    type: integer
    description: Number of files examined in the diff.
permissions:
  contents: read
  pull-requests: write
  checks: read
stop_conditions:
  - "Diff touches .github/workflows/ — stop and post a comment requesting human review."
  - "Diff touches CODEOWNERS — stop and post a comment requesting human review."
  - "Diff size exceeds 400 lines across more than 5 files — summarise scope and request human reviewer."
  - "PR targets main and no required status checks have passed — do not post approve recommendation."
audit_trail:
  required: true
  method: pr_comment
  format: |
    ## Agent Review Summary
    **Files reviewed:** {files_reviewed}
    **Recommendation:** {recommendation}
    **Rationale:** {rationale}
    > Generated by the review-pr skill. A human reviewer must approve before merge.
mcp_servers_allowed:
  - github-rest
  - github-graphql
