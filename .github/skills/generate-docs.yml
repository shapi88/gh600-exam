name: generate-docs
description: >
  Generates a Markdown draft for a new topic, tutorial, or deep-dive file
  based on a structured request. Creates the file on a new branch and opens
  a PR for human review. Never pushes directly to main.
autonomy_level: 2
trigger:
  event: workflow_dispatch
  inputs:
    doc_type:
      description: "Type of document to generate: topic | tutorial | deep-dive"
      required: true
    title:
      description: "Document title"
      required: true
    outline:
      description: "Bullet-point outline (one bullet per line)"
      required: false
input_schema:
  doc_type:
    type: string
    enum: [topic, tutorial, deep-dive]
    required: true
  title:
    type: string
    required: true
    maxLength: 120
  outline:
    type: string
    required: false
    description: Optional outline to guide content generation.
output_schema:
  file_path:
    type: string
    description: Path of the created file relative to repo root.
  pr_number:
    type: integer
    description: PR number opened for human review.
  word_count:
    type: integer
    description: Approximate word count of the generated document.
permissions:
  contents: write
  pull-requests: write
stop_conditions:
  - "Output path matches .github/workflows/** — stop; docs agent may not write workflow files."
  - "Output path matches CODEOWNERS — stop; docs agent may not write CODEOWNERS."
  - "Generated content contains a pattern matching a secret or credential — discard and stop."
  - "Branch already has uncommitted changes for the same file — stop and report conflict."
audit_trail:
  required: true
  method: pr_description
  format: |
    ## Generated by generate-docs skill
    **Document type:** {doc_type}
    **Title:** {title}
    **Word count:** {word_count}
    **Outline used:** {outline_summary}
    > This is an AI-generated draft. A human author must review and edit before merge.
mcp_servers_allowed:
  - github-rest
